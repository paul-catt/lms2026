<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Centre — LMS 2026</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .match-card { border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; background:var(--surface); }
    .match-card.live { border-color:var(--blue); }
    .match-card.complete { border-color:var(--border); opacity:0.85; }
    .match-teams { display:flex; align-items:center; justify-content:center; gap:12px; margin:10px 0; font-size:16px; font-weight:700; }
    .match-score { font-size:22px; font-weight:800; color:var(--text); min-width:60px; text-align:center; }
    .match-meta { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--text-muted); margin-bottom:10px; }
    .picks-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
    .pick-chip { display:inline-flex; align-items:center; gap:5px; background:var(--surface2); border-radius:20px; padding:4px 10px; font-size:12px; }
    .pick-chip.win { background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3); }
    .pick-chip.draw { background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.3); }
    .pick-chip.loss { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); }
    .odds-row { display:flex; gap:8px; font-size:11px; color:var(--text-muted); margin-top:6px; flex-wrap:wrap; }
    .odds-pill { background:var(--surface2); border-radius:6px; padding:2px 8px; font-size:11px; }
    .round-header { font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin:20px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
    .no-picks { color:var(--text-muted); font-size:12px; font-style:italic; }
    .test-date-banner { background:#7c3aed; color:#fff; text-align:center; padding:8px 16px; font-size:13px; font-weight:600; }
    .test-date-banner a { color:#e9d5ff; text-decoration:underline; cursor:pointer; margin-left:12px; font-weight:400; }
    .upcoming-card { border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:8px; background:var(--surface); opacity:0.8; }
    .upcoming-teams { display:flex; align-items:center; justify-content:center; gap:12px; font-size:14px; font-weight:600; }
    .upcoming-vs { font-size:13px; color:var(--text-muted); font-weight:400; }
  </style>
</head>
<body>

  <div class="test-date-banner" id="test-date-banner" style="display:none">
    🧪 Test mode — date overridden to <span id="banner-date"></span>
    <a href="/admin">Change in Admin</a>
  </div>

  <nav>
    <a class="nav-logo" href="/">⚽ LMS 2026</a>
    <div class="nav-links">
      <a href="/leaderboard">Leaderboard</a>
      <a href="/match-centre" class="active">Match Centre</a>
      <a href="/rules">Rules</a>
    </div>
  </nav>

  <main>
    <!-- Today -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
        <div class="card-title" style="margin-bottom:0">⚽ Today's Matches</div>
        <span id="today-date" style="font-size:11px; color:var(--text-muted)"></span>
      </div>
      <div id="today-loading" class="loading"><div class="spinner"></div>Loading...</div>
      <div id="today-content"></div>
    </div>

    <!-- Upcoming -->
    <div class="card" id="upcoming-card" style="display:none">
      <div class="card-title">📅 Upcoming Matches</div>
      <div id="upcoming-content"></div>
    </div>

    <!-- Results archive -->
    <div class="card">
      <div class="card-title">🏁 Results Archive</div>
      <div id="results-loading" class="loading"><div class="spinner"></div>Loading...</div>
      <div id="results-content"></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://jrdjdqjepffdcjdfuarc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyZGpkcWplcGZmZGNqZGZ1YXJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTczMTcsImV4cCI6MjA5MTAzMzMxN30.nzriEXXYSau-2wBElzgWw-Gwhf1crzVA2lcvPexjq0M';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── Test date override ────────────────────────────────────
    const LS_KEY = 'lms2026_test_date';
    function getEffectiveDate() {
      const override = localStorage.getItem(LS_KEY);
      return override ? new Date(override) : new Date();
    }
    (function initBanner() {
      const override = localStorage.getItem(LS_KEY);
      if (override) {
        const d = new Date(override);
        document.getElementById('banner-date').textContent =
          d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' }) +
          ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('test-date-banner').style.display = 'block';
      }
    })();

    // ── Game day window ───────────────────────────────────────
    // A "game day" runs 14:00 UTC → 10:00 UTC next day
    // Given an effective date, return the window start and end as ISO strings
    function getGameDayWindow(effectiveDate) {
      // Find the most recent 14:00 UTC on or before effectiveDate
      const d = new Date(effectiveDate);

      // Work in UTC
      const utcHour = d.getUTCHours();
      const utcMin  = d.getUTCMinutes();

      // If we're before 10:00 UTC, the game day started at 14:00 UTC *yesterday*
      // If we're between 10:00 and 14:00 UTC, there's a gap — treat as start of new day (14:00 today)
      // If we're at or after 14:00 UTC, the game day started at 14:00 UTC today

      let windowStart = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), 14, 0, 0));

      if (utcHour < 10) {
        // Before 10:00 UTC — game day started yesterday at 14:00
        windowStart = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() - 1, 14, 0, 0));
      } else if (utcHour < 14) {
        // Gap period 10:00–14:00 — no active game day, show yesterday's window
        // (edge case — in practice there are no kickoffs here)
        windowStart = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() - 1, 14, 0, 0));
      }
      // else >= 14:00 — game day started today at 14:00

      const windowEnd = new Date(windowStart.getTime() + (20 * 60 * 60 * 1000)); // +20h = 10:00 UTC next day

      return { windowStart, windowEnd };
    }

    // ── Format helpers ────────────────────────────────────────
    function fmtDateTime(isoString) {
      const d = new Date(isoString);
      const date = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
      const time = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      return date + ', ' + time;
    }

    function fmtTime(isoString) {
      return new Date(isoString).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    }

    function fmtDate(isoString) {
      return new Date(isoString).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
    }

    // ── Match card ────────────────────────────────────────────
    function matchCard(match, picks, allPlayers, showDate) {
      const kickoffStr = showDate ? fmtDateTime(match.kickoff) : fmtTime(match.kickoff);
      const scoreStr = match.home_score !== null ? match.home_score + ' – ' + match.away_score : 'vs';
      const isComplete = match.status === 'complete';
      const isLive = match.status === 'live';

      const homePicks = picks.filter(p => p.team_id === match.home_team_id && p.round_id === match.round_id);
      const awayPicks = picks.filter(p => p.team_id === match.away_team_id && p.round_id === match.round_id);
      const allMatchPicks = [...homePicks, ...awayPicks];

      const picksHtml = allMatchPicks.length === 0
        ? '<span class="no-picks">No picks for this match</span>'
        : allMatchPicks.map(p => {
            const player = allPlayers.find(pl => pl.id === p.player_id);
            const playerName = player ? player.name : '?';
            const result = p.pick_results && p.pick_results.length > 0 ? p.pick_results[0] : null;
            const chipClass = result ? result.match_result : '';
            const pts = result ? '+' + result.points_earned : '';
            const flag = p.team_id === match.home_team_id ? match.home_team.flag_emoji : match.away_team.flag_emoji;
            const isLongshot = p.team_id === match.home_team_id ? match.home_team.is_longshot : match.away_team.is_longshot;
            return '<div class="pick-chip ' + chipClass + '">' +
              '<a href="/' + (player ? player.slug : '#') + '" style="color:inherit;text-decoration:none;font-weight:600">' + playerName + '</a>' +
              ' ' + flag +
              '<span class="badge badge-' + (p.multiplier === 3 ? 'gold' : 'blue') + '" style="padding:1px 5px;font-size:10px">' + p.multiplier + 'pt</span>' +
              (isLongshot ? '<span title="Longshot bonus">⭐</span>' : '') +
              (pts ? '<strong>' + pts + '</strong>' : '') +
              '</div>';
          }).join('');

      const oddsHtml = match.odds_home
        ? '<div class="odds-row">' +
          '<span style="color:var(--text-muted)">Odds:</span>' +
          '<span class="odds-pill">' + match.home_team.name + ' ' + match.odds_home + '</span>' +
          '<span class="odds-pill">Draw ' + match.odds_draw + '</span>' +
          '<span class="odds-pill">' + match.away_team.name + ' ' + match.odds_away + '</span>' +
          '</div>'
        : '';

      return '<div class="match-card ' + match.status + '">' +
        '<div class="match-meta">' +
          '<span>' + match.rounds.name + ' · ' + kickoffStr + '</span>' +
          '<span class="badge badge-' + (isComplete ? 'grey' : isLive ? 'blue' : 'grey') + '">' +
            (isComplete ? 'FT' : isLive ? '🔴 Live' : fmtTime(match.kickoff)) +
          '</span>' +
        '</div>' +
        '<div class="match-teams">' +
          '<span>' + match.home_team.flag_emoji + ' ' + match.home_team.name + '</span>' +
          '<span class="match-score">' + scoreStr + '</span>' +
          '<span>' + match.away_team.name + ' ' + match.away_team.flag_emoji + '</span>' +
        '</div>' +
        oddsHtml +
        '<div class="picks-row">' + picksHtml + '</div>' +
        '</div>';
    }

    // ── Upcoming card ─────────────────────────────────────────
    function upcomingCard(match) {
      return '<div class="upcoming-card">' +
        '<div class="match-meta">' +
          '<span>' + match.rounds.name + '</span>' +
          '<span>' + fmtDateTime(match.kickoff) + '</span>' +
        '</div>' +
        '<div class="upcoming-teams">' +
          '<span>' + match.home_team.flag_emoji + ' ' + match.home_team.name + '</span>' +
          '<span class="upcoming-vs">vs</span>' +
          '<span>' + match.away_team.name + ' ' + match.away_team.flag_emoji + '</span>' +
        '</div>' +
        '</div>';
    }

    // ── Main load ─────────────────────────────────────────────
    async function loadAll() {
      try {
        const effectiveNow = getEffectiveDate();
        const { windowStart, windowEnd } = getGameDayWindow(effectiveNow);

        // Update today label using the game day window start date
        const gameDayDate = new Date(windowStart);
        // If window started yesterday (before 14:00 UTC now), label is "yesterday's" date — but
        // we want to show the primary date of the game day (the evening date)
        document.getElementById('today-date').textContent = fmtDate(windowStart.getTime() + 6 * 60 * 60 * 1000); // midpoint ~20:00 UTC

        const [
          { data: players },
          { data: picks }
        ] = await Promise.all([
          db.from('players').select('id, name, slug'),
          db.from('picks').select('player_id, team_id, multiplier, round_id, pick_results(points_earned, match_result)')
        ]);

        const matchSelect = 'id, kickoff, status, home_score, away_score, odds_home, odds_draw, odds_away, home_team_id, away_team_id, round_id, rounds(name, sort_order), home_team:teams!matches_home_team_id_fkey(id,name,flag_emoji,is_longshot), away_team:teams!matches_away_team_id_fkey(id,name,flag_emoji,is_longshot)';

        // Today's matches — within game day window, ordered by kickoff ASC
        const { data: todayMatches } = await db
          .from('matches')
          .select(matchSelect)
          .gte('kickoff', windowStart.toISOString())
          .lte('kickoff', windowEnd.toISOString())
          .not('home_team_id', 'is', null)
          .order('kickoff', { ascending: true });

        document.getElementById('today-loading').style.display = 'none';
        const todayContent = document.getElementById('today-content');

        if (!todayMatches || todayMatches.length === 0) {
          todayContent.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px">No matches today.</p>';
        } else {
          // Show date on the kickoff if the match is past midnight (i.e. next calendar day)
          const windowMidnight = new Date(Date.UTC(windowStart.getUTCFullYear(), windowStart.getUTCMonth(), windowStart.getUTCDate() + 1, 0, 0, 0));
          todayContent.innerHTML = todayMatches.map(m => {
            const kickoff = new Date(m.kickoff);
            const showDate = kickoff >= windowMidnight;
            return matchCard(m, picks || [], players || [], showDate);
          }).join('');
        }

        // Upcoming — next 5 days after today's window, not yet complete
        const upcomingStart = windowEnd;
        const upcomingEnd   = new Date(windowEnd.getTime() + 5 * 24 * 60 * 60 * 1000);

        const { data: upcomingMatches } = await db
          .from('matches')
          .select(matchSelect)
          .gt('kickoff', upcomingStart.toISOString())
          .lte('kickoff', upcomingEnd.toISOString())
          .not('home_team_id', 'is', null)
          .neq('status', 'complete')
          .order('kickoff', { ascending: true });

        const upcomingCard_el = document.getElementById('upcoming-card');
        const upcomingContent = document.getElementById('upcoming-content');

        if (upcomingMatches && upcomingMatches.length > 0) {
          // Group by date
          const byDate = {};
          upcomingMatches.forEach(m => {
            const dateKey = new Date(m.kickoff).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
            if (!byDate[dateKey]) byDate[dateKey] = [];
            byDate[dateKey].push(m);
          });

          upcomingContent.innerHTML = Object.entries(byDate).map(([date, matches]) =>
            '<div class="round-header">' + date + '</div>' +
            matches.map(m => upcomingCard(m)).join('')
          ).join('');

          upcomingCard_el.style.display = 'block';
        }

        // Results archive — complete matches, newest first, grouped by round sorted by sort_order desc
        const { data: allMatches } = await db
          .from('matches')
          .select(matchSelect)
          .eq('status', 'complete')
          .not('home_team_id', 'is', null)
          .order('kickoff', { ascending: false });

        document.getElementById('results-loading').style.display = 'none';
        const resultsContent = document.getElementById('results-content');

        if (!allMatches || allMatches.length === 0) {
          resultsContent.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px">No results yet.</p>';
          return;
        }

        // Group by round, sort groups by sort_order descending (most recent round first)
        const byRound = {};
        allMatches.forEach(m => {
          const key = m.rounds.name;
          if (!byRound[key]) byRound[key] = { sort_order: m.rounds.sort_order, matches: [] };
          byRound[key].matches.push(m);
        });

        const sortedRounds = Object.entries(byRound).sort((a, b) => b[1].sort_order - a[1].sort_order);

        resultsContent.innerHTML = sortedRounds.map(([roundName, { matches }]) =>
          '<div class="round-header">' + roundName + '</div>' +
          matches.map(m => matchCard(m, picks || [], players || [], true)).join('')
        ).join('');

      } catch(err) {
        console.error(err);
        document.getElementById('today-loading').style.display = 'none';
        document.getElementById('results-loading').style.display = 'none';
        document.getElementById('today-content').innerHTML = '<p style="color:var(--red)">Failed to load. Check console.</p>';
      }
    }

    loadAll();
    setInterval(loadAll, 60000);
  </script>
</body>
</html>
