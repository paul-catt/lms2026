<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Centre — LMS 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LMS 2026">

  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    nav, .nav-logo, .card-title, thead th, .day-num { font-family: 'Rajdhani', sans-serif; }

    /* ── Deadline card ─────────────────────────────────── */
    .deadline-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .deadline-card.open   { border-color: #f59e0b; background: rgba(245,158,11,0.05); }
    .deadline-card.locked { border-color: #ef4444; background: rgba(239,68,68,0.05); }
    .deadline-inner { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    .deadline-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:4px; }
    .deadline-round-name { font-size:18px; font-weight:800; color:var(--text); }
    .deadline-date-str { font-size:13px; color:var(--text-muted); margin-top:3px; }
    .deadline-timer { font-size:36px; font-weight:900; font-variant-numeric:tabular-nums; letter-spacing:-0.02em; line-height:1; min-width:200px; text-align:right; }
    .deadline-timer.open   { color:#f59e0b; }
    .deadline-timer.urgent { color:#ef4444; }
    .deadline-timer.locked { color:var(--text-muted); font-size:18px; font-weight:700; }

    /* ── Round colours ─────────────────────────────────── */
    /* Each round has a colour token used for banners AND day headers */
    :root {
      --rc-gp1:   #6366f1; /* indigo */
      --rc-gp2:   #8b5cf6; /* violet */
      --rc-gp3:   #a855f7; /* purple */
      --rc-r32:   #0ea5e9; /* sky */
      --rc-r16:   #10b981; /* emerald */
      --rc-qf:    #f59e0b; /* amber */
      --rc-sf:    #ef4444; /* red */
      --rc-3p:    #6b7280; /* grey */
      --rc-final: #dc2626; /* blood red */
    }

    /* ── Round banners (item 5) ────────────────────────── */
    .round-banner {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 7px 14px;
      border-radius: 8px;
      margin: 20px 0 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .round-banner:first-child { margin-top: 0; }

    .round-banner-gp1   { background: rgba(99,102,241,0.12);  color: var(--rc-gp1);   border-left: 3px solid var(--rc-gp1); }
    .round-banner-gp2   { background: rgba(139,92,246,0.12);  color: var(--rc-gp2);   border-left: 3px solid var(--rc-gp2); }
    .round-banner-gp3   { background: rgba(168,85,247,0.12);  color: var(--rc-gp3);   border-left: 3px solid var(--rc-gp3); }
    .round-banner-r32   { background: rgba(14,165,233,0.12);  color: var(--rc-r32);   border-left: 3px solid var(--rc-r32); }
    .round-banner-r16   { background: rgba(16,185,129,0.12);  color: var(--rc-r16);   border-left: 3px solid var(--rc-r16); }
    .round-banner-qf    { background: rgba(245,158,11,0.12);  color: var(--rc-qf);    border-left: 3px solid var(--rc-qf); }
    .round-banner-sf    { background: rgba(239,68,68,0.12);   color: var(--rc-sf);    border-left: 3px solid var(--rc-sf); }
    .round-banner-3p    { background: rgba(107,114,128,0.12); color: var(--rc-3p);    border-left: 3px solid var(--rc-3p); }
    .round-banner-final { background: rgba(220,38,38,0.15);   color: var(--rc-final); border-left: 3px solid var(--rc-final); }

    /* ── Day headers (items 2/3/4/5) ──────────────────── */
    /* Format: ROUND NAME · DAY X · DATE */
    .day-header {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 14px 0 6px;
      padding: 6px 10px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .day-header:first-child { margin-top: 4px; }

    /* Colour variants matching round */
    .day-header-gp1   { background: rgba(99,102,241,0.07);  color: var(--rc-gp1); }
    .day-header-gp2   { background: rgba(139,92,246,0.07);  color: var(--rc-gp2); }
    .day-header-gp3   { background: rgba(168,85,247,0.07);  color: var(--rc-gp3); }
    .day-header-r32   { background: rgba(14,165,233,0.07);  color: var(--rc-r32); }
    .day-header-r16   { background: rgba(16,185,129,0.07);  color: var(--rc-r16); }
    .day-header-qf    { background: rgba(245,158,11,0.07);  color: var(--rc-qf); }
    .day-header-sf    { background: rgba(239,68,68,0.07);   color: var(--rc-sf); }
    .day-header-3p    { background: rgba(107,114,128,0.07); color: var(--rc-3p); }
    .day-header-final { background: rgba(220,38,38,0.1);    color: var(--rc-final); }

    .day-header .sep { opacity: 0.6; margin: 0 7px; font-weight: 400; }
    .day-today-badge {
      margin-left: 8px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(245,158,11,0.2);
      color: var(--gold);
      padding: 1px 6px;
      border-radius: 8px;
    }

    /* ── Match cards ───────────────────────────────────── */
    .match-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 6px;
    }
    .match-card.complete { opacity: 0.75; }
    .match-card.live     { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }

    .match-main { display:flex; align-items:center; gap:8px; flex-wrap:nowrap; }
    .match-time { font-size:11px; font-weight:600; color:var(--text-muted); min-width:36px; flex-shrink:0; }
    .match-home, .match-away { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .match-home { flex:1; text-align:right; }
    .match-away { flex:1; }
    .match-score-inline { font-size:18px; font-weight:900; color:var(--text); min-width:52px; text-align:center; flex-shrink:0; letter-spacing:-0.01em; }
    .match-vs { font-size:11px; color:var(--text-muted); min-width:52px; text-align:center; flex-shrink:0; }
    .match-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; white-space:nowrap; flex-shrink:0; }
    .badge-ft    { background:rgba(148,163,184,0.1); color:var(--text-muted); }
    .badge-live  { background:rgba(59,130,246,0.15); color:#3b82f6; }

    .match-sub { padding-left:44px; margin-top:5px; }
    .match-aet { font-size:11px; color:var(--text-muted); margin-bottom:4px; }

    /* ── Odds (items 6 & 7) ────────────────────────────── */
    .odds-row { display:flex; gap:5px; flex-wrap:wrap; align-items:center; margin-bottom:4px; }
    .odds-label { font-size:11px; color:var(--text-muted); margin-right:2px; }
    .odds-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 11px;
      color: var(--text-muted);
      transition: all 0.1s;
    }
    /* Item 7: winning odds highlighted, others dimmed */
    .odds-pill.odds-winner { color: var(--text); border-color: var(--green); background: rgba(16,185,129,0.1); font-weight: 700; }
    .odds-pill.odds-loser  { opacity: 0.35; }
    .no-odds { font-size:11px; color:var(--border); font-style:italic; }

    /* ── Picks ─────────────────────────────────────────── */
    .picks-row { display:flex; flex-wrap:wrap; gap:4px; padding-top:6px; border-top:1px solid var(--border); margin-top:4px; }
    .pick-chip { display:inline-flex; align-items:center; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:3px 8px; font-size:12px; }
    .pick-chip.win  { background:rgba(16,185,129,0.1);  border-color:rgba(16,185,129,0.3); }
    .pick-chip.draw { background:rgba(245,158,11,0.1);  border-color:rgba(245,158,11,0.3); }
    .pick-chip.loss { background:rgba(239,68,68,0.1);   border-color:rgba(239,68,68,0.3); }
    .no-picks { font-size:11px; color:var(--text-muted); font-style:italic; }

    .upcoming-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin-bottom:6px; opacity:0.72; }

    @media (max-width: 600px) {
      .deadline-timer { font-size:26px; min-width:0; text-align:left; }
      .match-home, .match-away { font-size:12px; }
      .match-score-inline { font-size:16px; min-width:44px; }
      .match-sub { padding-left:0; }
    }
  </style>
</head>
<body>

  <!-- Item 29: purple test banner removed -->

  <nav>
    <a class="nav-logo" href="/"><img src="/logo.svg" alt="LMS 2026" height="34"></a>
    <div class="nav-links">
      <a href="/leaderboard">Leaderboard</a>
      <a href="/match-centre" class="active">Match Centre</a>

  <main>
    <div id="deadline-card-wrap"></div>

    <div class="card" id="today-card">
      <div class="card-title">📅 Today</div>
      <div id="today-loading" class="loading"><div class="spinner"></div>Loading...</div>
      <div id="today-content"></div>
    </div>

    <div class="card" id="upcoming-card" style="display:none">
      <div class="card-title">📅 Upcoming</div>
      <div id="upcoming-content"></div>
    </div>

    <div class="card">
      <div class="card-title">🏁 Results Archive</div>
      <div id="results-loading" class="loading"><div class="spinner"></div>Loading...</div>
      <div id="results-content"></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://jrdjdqjepffdcjdfuarc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyZGpkcWplcGZmZGNqZGZ1YXJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTczMTcsImV4cCI6MjA5MTAzMzMxN30.nzriEXXYSau-2wBElzgWw-Gwhf1crzVA2lcvPexjq0M';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const LS_KEY = 'lms2026_test_date';

    const WINDOW_START_HOUR  = 11;
    const WINDOW_DURATION_MS = 24 * 60 * 60 * 1000;

    function getEffectiveDate() {
      const o = localStorage.getItem(LS_KEY);
      return o ? new Date(o) : new Date();
    }

    function toWindowStartMs(isoStr) {
      const d = new Date(isoStr), h = d.getUTCHours();
      if (h < WINDOW_START_HOUR)
        return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() - 1, WINDOW_START_HOUR, 0, 0);
      return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), WINDOW_START_HOUR, 0, 0);
    }

    function getGameDayWindow(date) {
      const d = new Date(date), h = d.getUTCHours();
      const ws = h < WINDOW_START_HOUR
        ? new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() - 1, WINDOW_START_HOUR, 0, 0))
        : new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), WINDOW_START_HOUR, 0, 0));
      return { windowStart: ws, windowEnd: new Date(ws.getTime() + WINDOW_DURATION_MS) };
    }

    function getDayNumber(kickoffIso, roundFirstKickoffIso) {
      return Math.round((toWindowStartMs(kickoffIso) - toWindowStartMs(roundFirstKickoffIso)) / WINDOW_DURATION_MS) + 1;
    }

    function fmtTime(iso) { return new Date(iso).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }); }
    function fmtShortDate(iso) { return new Date(iso).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }); }
    function fmtLongDate(iso)  { return new Date(iso).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' }); }

    // Item 6: format odds — max 1dp, drop trailing zero
    function fmtOdds(val) {
      if (!val) return '—';
      const n = parseFloat(val);
      if (isNaN(n)) return '—';
      // 1dp, strip trailing zero
      return (Math.round(n * 10) / 10).toString();
    }

    // Map round name → CSS key
    function roundKey(name) {
      const n = (name || '').toLowerCase().replace(/\s+/g, '');
      if (n.includes('groupphase1') || n === 'gp1') return 'gp1';
      if (n.includes('groupphase2') || n === 'gp2') return 'gp2';
      if (n.includes('groupphase3') || n === 'gp3') return 'gp3';
      if (n.includes('roundof32')   || n === 'r32') return 'r32';
      if (n.includes('roundof16')   || n === 'r16') return 'r16';
      if (n.includes('quarter')     || n === 'qf')  return 'qf';
      if (n.includes('semi')        || n === 'sf')  return 'sf';
      if (n.includes('3rd') || n.includes('third')) return '3p';
      if (n.includes('final'))                      return 'final';
      return 'gp1';
    }

    function roundBannerClass(name)  { return 'round-banner-' + roundKey(name); }
    function dayHeaderClass(name)    { return 'day-header-'    + roundKey(name); }

    // ── Deadline countdown ───────────────────────────────
    let deadlineInterval = null;

    async function loadDeadline() {
      const { data: rounds } = await db.from('rounds')
        .select('id, name, deadline, is_complete, sort_order')
        .eq('is_complete', false).order('sort_order').limit(1);

      const wrap = document.getElementById('deadline-card-wrap');
      if (!rounds || rounds.length === 0) { wrap.innerHTML = ''; return; }

      const round    = rounds[0];
      const deadline = new Date(round.deadline);

      wrap.innerHTML = `
        <div class="deadline-card open" id="dl-card">
          <div class="deadline-inner">
            <div>
              <div class="deadline-label">⏰ Picks Deadline</div>
              <div class="deadline-round-name" id="dl-round">${round.name}</div>
              <div class="deadline-date-str" id="dl-date">${fmtLongDate(deadline.toISOString())} at ${fmtTime(deadline.toISOString())}</div>
            </div>
            <div class="deadline-timer open" id="dl-timer">--:--:--</div>
          </div>
        </div>`;

      function tick() {
        const diff  = deadline - getEffectiveDate();
        const card  = document.getElementById('dl-card');
        const timer = document.getElementById('dl-timer');
        if (!card || !timer) return;
        if (diff <= 0) {
          card.className = 'deadline-card locked';
          document.getElementById('dl-round').textContent = '🔒 ' + round.name + ' — Picks Locked';
          document.getElementById('dl-date').textContent  = 'Deadline has passed.';
          timer.className = 'deadline-timer locked';
          timer.textContent = 'LOCKED';
          if (deadlineInterval) { clearInterval(deadlineInterval); deadlineInterval = null; }
          return;
        }
        const days  = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins  = Math.floor((diff % 3600000)  / 60000);
        const secs  = Math.floor((diff % 60000)    / 1000);
        timer.textContent = days > 0
          ? days + 'd ' + String(hours).padStart(2,'0') + 'h ' + String(mins).padStart(2,'0') + 'm ' + String(secs).padStart(2,'0') + 's'
          : String(hours).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
        timer.className = 'deadline-timer ' + (diff < 3 * 3600000 ? 'urgent' : 'open');
      }
      tick();
      if (deadlineInterval) clearInterval(deadlineInterval);
      deadlineInterval = setInterval(tick, 1000);
    }

    // ── Odds HTML ────────────────────────────────────────
    // Item 6: 1dp. Item 7: winner highlighted in results, others dimmed.
    function oddsHtml(match, highlightWinner) {
      if (!match.odds_home) return '<div class="odds-row"><span class="no-odds">No odds yet</span></div>';

      // Determine winner for highlighting
      let winnerSide = null; // 'home', 'draw', 'away'
      if (highlightWinner && match.status === 'complete') {
        if (match.home_score > match.away_score) winnerSide = 'home';
        else if (match.away_score > match.home_score) winnerSide = 'away';
        else winnerSide = 'draw';
        // pens: winner side takes it
        if (match.pens_winner_id) {
          winnerSide = match.pens_winner_id === match.home_team_id ? 'home' : 'away';
        }
      }

      function pillCls(side) {
        if (!winnerSide) return 'odds-pill';
        if (side === winnerSide) return 'odds-pill odds-winner';
        return 'odds-pill odds-loser';
      }

      return '<div class="odds-row">' +
        '<span class="odds-label">Odds</span>' +
        '<span class="' + pillCls('home') + '">' + match.home_team.name + ' ' + fmtOdds(match.odds_home) + '</span>' +
        '<span class="' + pillCls('draw') + '">Draw ' + fmtOdds(match.odds_draw) + '</span>' +
        '<span class="' + pillCls('away') + '">' + match.away_team.name + ' ' + fmtOdds(match.odds_away) + '</span>' +
        '</div>';
    }

    // ── Match card (today + results archive) ────────────
    // Item 8: showVenue=false for results archive
    function matchCardHtml(match, picks, allPlayers, showVenue) {
      const isComplete = match.status === 'complete';
      const isLive     = match.status === 'live';

      const middleHtml = isComplete
        ? '<span class="match-score-inline">' + match.home_score + '–' + match.away_score + '</span>'
        : '<span class="match-vs">vs</span>';

      const badgeHtml = isComplete
        ? '<span class="match-badge badge-ft">FT</span>'
        : isLive ? '<span class="match-badge badge-live">🔴 Live</span>' : '';

      let aetHtml = '';
      if (isComplete && match.pens_winner_id) {
        const w = match.pens_winner_id === match.home_team_id ? match.home_team : match.away_team;
        aetHtml = '<div class="match-aet">AET · ' + w.flag_emoji + ' ' + w.name + ' win on penalties</div>';
      }

      // Picks for this match
      const matchPicks = (picks || []).filter(p =>
        p.round_id === match.round_id &&
        (p.team_id === match.home_team_id || p.team_id === match.away_team_id)
      );

      let picksHtml;
      if (matchPicks.length === 0) {
        picksHtml = '<div class="match-sub"><div class="picks-row"><span class="no-picks">No picks for this match</span></div></div>';
      } else {
        const chips = matchPicks.map(p => {
          const pl         = (allPlayers || []).find(pl => pl.id === p.player_id);
          const result     = p.pick_results && p.pick_results.length > 0 ? p.pick_results[0] : null;
          const chipClass  = result ? result.match_result : '';
          const pts        = result ? '+' + result.points_earned : '';
          const isHome     = p.team_id === match.home_team_id;
          const flag       = isHome ? match.home_team.flag_emoji : match.away_team.flag_emoji;
          const isLongshot = isHome ? match.home_team.is_longshot : match.away_team.is_longshot;
          return '<div class="pick-chip ' + chipClass + '">' +
            '<a href="/' + (pl ? pl.slug : '#') + '" style="color:inherit;text-decoration:none;font-weight:700">' +
              (pl ? pl.name : '?') + '</a>' +
            ' ' + flag +
            ' <span class="badge badge-' + (p.multiplier === 3 ? 'gold' : 'blue') + '" style="padding:1px 5px;font-size:10px">' + p.multiplier + 'pt</span>' +
            (isLongshot ? ' ⭐' : '') +
            (pts ? ' <strong>' + pts + '</strong>' : '') +
            '</div>';
        }).join('');
        picksHtml = '<div class="match-sub"><div class="picks-row">' + chips + '</div></div>';
      }

      // Item 8: venue only shown when showVenue=true
      const venueHtml = (showVenue && match.venue)
        ? '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;padding-left:44px">📍 ' + match.venue + '</div>'
        : '';

      return '<div class="match-card ' + match.status + '">' +
        '<div class="match-main">' +
          '<span class="match-time">' + fmtTime(match.kickoff) + '</span>' +
          '<span class="match-home">' + match.home_team.flag_emoji + ' ' + match.home_team.name + '</span>' +
          middleHtml +
          '<span class="match-away">' + match.away_team.name + ' ' + match.away_team.flag_emoji + '</span>' +
          badgeHtml +
        '</div>' +
        venueHtml +
        (aetHtml ? '<div class="match-sub">' + aetHtml + '</div>' : '') +
        '<div class="match-sub">' + oddsHtml(match, isComplete) + '</div>' +
        picksHtml +
        '</div>';
    }

    // ── Upcoming card (item 1: show picks) ──────────────
    function upcomingCardHtml(match, picks, allPlayers) {
      const venueHtml = match.venue
        ? '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;padding-left:44px">📍 ' + match.venue + '</div>'
        : '';

      // Item 1: picks for upcoming matches
      const matchPicks = (picks || []).filter(p =>
        p.round_id === match.round_id &&
        (p.team_id === match.home_team_id || p.team_id === match.away_team_id)
      );

      let picksHtml = '';
      if (matchPicks.length > 0) {
        const chips = matchPicks.map(p => {
          const pl         = (allPlayers || []).find(pl => pl.id === p.player_id);
          const isHome     = p.team_id === match.home_team_id;
          const flag       = isHome ? match.home_team.flag_emoji : match.away_team.flag_emoji;
          const isLongshot = isHome ? match.home_team.is_longshot : match.away_team.is_longshot;
          return '<div class="pick-chip">' +
            '<a href="/' + (pl ? pl.slug : '#') + '" style="color:inherit;text-decoration:none;font-weight:700">' +
              (pl ? pl.name : '?') + '</a>' +
            ' ' + flag +
            ' <span class="badge badge-' + (p.multiplier === 3 ? 'gold' : 'blue') + '" style="padding:1px 5px;font-size:10px">' + p.multiplier + 'pt</span>' +
            (isLongshot ? ' ⭐' : '') +
            '</div>';
        }).join('');
        picksHtml = '<div class="match-sub"><div class="picks-row">' + chips + '</div></div>';
      }

      return '<div class="upcoming-card">' +
        '<div class="match-main">' +
          '<span class="match-time">' + fmtTime(match.kickoff) + '</span>' +
          '<span class="match-home">' + match.home_team.flag_emoji + ' ' + match.home_team.name + '</span>' +
          '<span class="match-vs">vs</span>' +
          '<span class="match-away">' + match.away_team.name + ' ' + match.away_team.flag_emoji + '</span>' +
        '</div>' +
        venueHtml +
        '<div class="match-sub">' + oddsHtml(match, false) + '</div>' +
        picksHtml +
        '</div>';
    }

    // ── Day header (items 2/3/4/5) ───────────────────────
    // Format: ROUND NAME · DAY X · DATE
    function dayHeaderHtml(roundName, dayNum, windowStartMs, isToday) {
      const cls     = dayHeaderClass(roundName);
      const repDate = new Date(windowStartMs + 4 * 60 * 60 * 1000);
      const dateStr = repDate.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }).toUpperCase();
      const todayBadge = isToday ? ' <span class="day-today-badge">Today</span>' : '';
      return '<div class="day-header ' + cls + '">' +
        '<span>' + roundName.toUpperCase() + '</span>' +
        '<span class="sep">|</span>' +
        '<span>Day ' + dayNum + '</span>' +
        '<span class="sep">|</span>' +
        '<span>' + dateStr + '</span>' +
        todayBadge +
        '</div>';
    }

    async function getRoundFirstKickoff(roundId) {
      const { data } = await db.from('matches').select('kickoff')
        .eq('round_id', roundId).not('home_team_id', 'is', null)
        .order('kickoff', { ascending: true }).limit(1);
      return data && data.length > 0 ? data[0].kickoff : null;
    }

    async function loadAll() {
      loadDeadline();
      try {
        const effectiveNow = getEffectiveDate();
        const { windowStart, windowEnd } = getGameDayWindow(effectiveNow);

        const [{ data: players }, { data: picks }] = await Promise.all([
          db.from('players').select('id, name, slug'),
          db.from('picks').select('player_id, team_id, multiplier, round_id, pick_results(points_earned, match_result)')
        ]);

        const matchSel = 'id, kickoff, status, home_score, away_score, odds_home, odds_draw, odds_away, home_team_id, away_team_id, round_id, pens_winner_id, venue, rounds(id, name, sort_order), home_team:teams!matches_home_team_id_fkey(id,name,flag_emoji,is_longshot), away_team:teams!matches_away_team_id_fkey(id,name,flag_emoji,is_longshot)';

        // ── TODAY ──────────────────────────────────────────
        const { data: todayMatches } = await db.from('matches').select(matchSel)
          .gte('kickoff', windowStart.toISOString())
          .lt('kickoff',  windowEnd.toISOString())
          .not('home_team_id', 'is', null)
          .order('kickoff', { ascending: true });

        document.getElementById('today-loading').style.display = 'none';
        const todayContent = document.getElementById('today-content');

        if (!todayMatches || todayMatches.length === 0) {
          todayContent.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px">No matches today.</p>';
        } else {
          const rName      = todayMatches[0].rounds ? todayMatches[0].rounds.name : '';
          const roundFirst = await getRoundFirstKickoff(todayMatches[0].round_id);
          const dayNum     = roundFirst ? getDayNumber(windowStart.toISOString(), roundFirst) : 1;
          todayContent.innerHTML = dayHeaderHtml(rName, dayNum, windowStart.getTime(), true) +
            todayMatches.map(m => matchCardHtml(m, picks, players, true)).join('');
        }

        // ── UPCOMING ───────────────────────────────────────
        const upcoming2End = new Date(windowEnd.getTime() + 2 * WINDOW_DURATION_MS);
        const { data: upcomingMatches } = await db.from('matches').select(matchSel)
          .gte('kickoff', windowEnd.toISOString())
          .lt('kickoff',  upcoming2End.toISOString())
          .not('home_team_id', 'is', null)
          .neq('status', 'complete')
          .order('kickoff', { ascending: true });

        const upcomingCardEl  = document.getElementById('upcoming-card');
        const upcomingContent = document.getElementById('upcoming-content');

        if (upcomingMatches && upcomingMatches.length > 0) {
          // Group by window day
          const buckets = {};
          upcomingMatches.forEach(m => {
            const key = toWindowStartMs(m.kickoff);
            if (!buckets[key]) buckets[key] = { wsMs: key, matches: [], roundName: m.rounds ? m.rounds.name : '' };
            buckets[key].matches.push(m);
          });
          // Pre-fetch first kickoff per round
          const roundFirstCache = {};
          for (const b of Object.values(buckets)) {
            const rid = b.matches[0].round_id;
            if (!roundFirstCache[rid]) roundFirstCache[rid] = await getRoundFirstKickoff(rid);
          }
          let html = '';
          Object.values(buckets).sort((a,b) => a.wsMs - b.wsMs).forEach(b => {
            const rid    = b.matches[0].round_id;
            const dayNum = roundFirstCache[rid] ? getDayNumber(new Date(b.wsMs).toISOString(), roundFirstCache[rid]) : 1;
            // Items 2/5: day header with round name + colour
            html += dayHeaderHtml(b.roundName, dayNum, b.wsMs);
            html += b.matches.map(m => upcomingCardHtml(m, picks, players)).join('');
          });
          upcomingContent.innerHTML = html;
          upcomingCardEl.style.display = 'block';
        } else {
          upcomingCardEl.style.display = 'none';
        }

        // ── RESULTS ARCHIVE ────────────────────────────────
        const { data: allMatches } = await db.from('matches').select(matchSel)
          .eq('status', 'complete')
          .not('home_team_id', 'is', null)
          .order('kickoff', { ascending: false });

        document.getElementById('results-loading').style.display = 'none';
        const resultsContent = document.getElementById('results-content');

        if (!allMatches || allMatches.length === 0) {
          resultsContent.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px">No results yet.</p>';
          return;
        }

        const byRound = {};
        allMatches.forEach(m => {
          const key = m.rounds.name;
          if (!byRound[key]) byRound[key] = { sort_order: m.rounds.sort_order, round_id: m.round_id, matches: [] };
          byRound[key].matches.push(m);
        });

        const sortedRounds = Object.entries(byRound).sort((a,b) => b[1].sort_order - a[1].sort_order);
        const roundFirstMap = {};
        for (const [, { round_id }] of sortedRounds) {
          if (!roundFirstMap[round_id]) roundFirstMap[round_id] = await getRoundFirstKickoff(round_id);
        }

        resultsContent.innerHTML = sortedRounds.map(([roundName, { round_id, matches }]) => {
          const dayBuckets = {};
          matches.forEach(m => {
            const wsMs = toWindowStartMs(m.kickoff);
            if (!dayBuckets[wsMs]) dayBuckets[wsMs] = { wsMs, matches: [] };
            dayBuckets[wsMs].matches.push(m);
          });

          const roundFirst      = roundFirstMap[round_id];
          const dayBucketsSorted = Object.values(dayBuckets).sort((a,b) => b.wsMs - a.wsMs);
          // Items 4/5: banner colour matches round
          const bannerCls = 'round-banner ' + roundBannerClass(roundName);

          return '<div class="' + bannerCls + '">🏆 ' + roundName + '</div>' +
            dayBucketsSorted.map(b => {
              const dayNum  = roundFirst ? getDayNumber(new Date(b.wsMs).toISOString(), roundFirst) : 1;
              // Items 4/5: day header with round name + colour. Item 8: showVenue=false
              return dayHeaderHtml(roundName, dayNum, b.wsMs) +
                b.matches.map(m => matchCardHtml(m, picks, players, false)).join('');
            }).join('');
        }).join('');

      } catch(err) {
        console.error(err);
        document.getElementById('today-loading').style.display = 'none';
        document.getElementById('results-loading').style.display = 'none';
        document.getElementById('today-content').innerHTML = '<p style="color:var(--red)">Failed to load. Check console.</p>';
      }
    }

    loadAll();
    setInterval(loadAll, 60000);
  </script>
</body>
</html>
