<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — LMS 2026</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .pos { font-weight:700; color:var(--text-muted); width:32px; }
    .prior { width:40px; text-align:center; font-size:11px; }
    .medal { width:24px; text-align:center; }
    .player-name { font-weight:600; }
    .player-name a { color:var(--text); text-decoration:none; }
    .player-name a:hover { color:var(--accent); }
    .points { font-size:16px; font-weight:700; }
    .out-row { opacity:0.45; }
    .playing-row { background:rgba(59,130,246,0.12) !important; }
    .playing-row:hover { background:rgba(59,130,246,0.18) !important; }
    .form-pip { display:inline-block; width:10px; height:10px; border-radius:50%; margin:0 1px; }
    .form-W { background:var(--green); }
    .form-D { background:var(--gold); }
    .form-L { background:var(--red); }
    .arrow-up { color:var(--green); font-size:11px; font-weight:700; }
    .arrow-dn { color:var(--red); font-size:11px; font-weight:700; }
    .arrow-eq { color:var(--text-muted); font-size:11px; }
    .flag-inline { font-size:15px; margin-left:5px; vertical-align:middle; display:inline-block; padding-bottom:2px; }
    .gd-pos { color:var(--green); font-weight:600; }
    .gd-neg { color:var(--red); font-weight:600; }
    .gd-zero { color:var(--text-muted); }
    .tiebreak-val { color:var(--text-muted); font-size:12px; }
    .round-heading { font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:12px; }
    thead th { white-space:nowrap; font-size:11px; color:var(--text-muted); }
    td { font-size:13px; }
    @media(max-width:600px) { .hide-mobile { display:none; } }
    .flag-3pt { border-bottom: 2px solid #f59e0b; }
    .flag-2pt { border-bottom: 2px solid #94a3b8; }
    .flag-3pt-longshot { border-bottom: 4px double #f59e0b; }
    .flag-2pt-longshot { border-bottom: 4px double #94a3b8; }
    .rotate-hint { display:none; }
    @media(max-width:900px) { .rotate-hint { display:block; margin-top:8px; font-size:11px; color:var(--text-muted); } }
    @media(max-width:900px) and (orientation:landscape) { .rotate-hint { display:none; } }
    .test-date-banner { background:#7c3aed; color:#fff; text-align:center; padding:8px 16px; font-size:13px; font-weight:600; }
    .test-date-banner a { color:#e9d5ff; text-decoration:underline; cursor:pointer; margin-left:12px; font-weight:400; }
    .proj-goals { font-size:11px; color:var(--text-muted); margin-top:4px; }
    .goals-diff { font-weight:700; font-size:13px; }
    .goals-diff-close { color:var(--green); }
    .goals-diff-mid { color:var(--gold); }
    .goals-diff-far { color:var(--red); }
  </style>
</head>
<body>

  <div class="test-date-banner" id="test-date-banner" style="display:none">
    🧪 Test mode — date overridden to <span id="banner-date"></span>
    <a href="/admin">Change in Admin</a>
  </div>

  <nav>
    <a class="nav-logo" href="/">⚽ LMS 2026</a>
    <div class="nav-links">
      <a href="/leaderboard" class="active">Leaderboard</a>
      <a href="/match-centre">Match Centre</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; flex-wrap:wrap; gap:8px">
        <div class="card-title" style="margin-bottom:0">📊 Leaderboard</div>
        <span id="last-updated" style="font-size:11px; color:var(--text-muted)"></span>
      </div>
      <div id="round-heading" class="round-heading"></div>
      <div id="proj-goals-label" class="proj-goals"></div>
      <div id="loading" class="loading"><div class="spinner"></div>Loading standings...</div>
      <div id="leaderboard-wrap" class="table-wrap" style="display:none">
        <table>
          <thead>
            <tr>
              <th class="pos">#</th>
              <th class="prior">Prior</th>
              <th class="medal"></th>
              <th>Player</th>
              <th>Pld</th>
              <th>Pts</th>
              <th>GD</th>
              <th class="hide-mobile">Diff from<br>proj.</th>
              <th class="hide-mobile">Form</th>
              <th class="hide-mobile" id="left-col-header" style="display:none">Left</th>
              <th class="hide-mobile" id="status-col-header" style="display:none">Status</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
      <div style="margin-top:14px; font-size:11px; color:var(--text-muted); display:flex; gap:16px; flex-wrap:wrap">
        <span>🔵 Playing today</span>
        <span class="knockout-only" style="display:none">🟢 Alive</span>
        <span class="knockout-only" style="display:none">🔴 Eliminated</span>
        <span class="group-only"><span style="display:inline-block;width:18px;border-bottom:2px solid #f59e0b;margin-right:3px;vertical-align:middle"></span>3pts pick</span>
        <span class="group-only"><span style="display:inline-block;width:18px;border-bottom:2px solid #94a3b8;margin-right:3px;vertical-align:middle"></span>2pts pick</span>
        <span class="group-only"><span style="display:inline-block;width:18px;border-bottom:4px double #f59e0b;margin-right:3px;vertical-align:middle"></span>Longshot (4pts)</span>
        <span class="group-only"><span style="display:inline-block;width:18px;border-bottom:4px double #94a3b8;margin-right:3px;vertical-align:middle"></span>Longshot (3pts)</span>
      </div>
      <div class="rotate-hint">↔ Rotate phone for full table</div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://jrdjdqjepffdcjdfuarc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyZGpkcWplcGZmZGNqZGZ1YXJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTczMTcsImV4cCI6MjA5MTAzMzMxN30.nzriEXXYSau-2wBElzgWw-Gwhf1crzVA2lcvPexjq0M';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const TOTAL_MATCHES = 104;

    // ── Test date override ────────────────────────────────────
    const LS_KEY = 'lms2026_test_date';
    function getEffectiveDate() {
      const override = localStorage.getItem(LS_KEY);
      return override ? new Date(override) : new Date();
    }
    (function initBanner() {
      const override = localStorage.getItem(LS_KEY);
      if (override) {
        const d = new Date(override);
        document.getElementById('banner-date').textContent =
          d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' }) +
          ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('test-date-banner').style.display = 'block';
      }
    })();

    // ── Game day window ───────────────────────────────────────
    function getGameDayWindow(effectiveDate) {
      const d = new Date(effectiveDate);
      const utcHour = d.getUTCHours();
      let windowStart;
      if (utcHour < 10) {
        windowStart = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() - 1, 14, 0, 0));
      } else {
        windowStart = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), 14, 0, 0));
      }
      const windowEnd = new Date(windowStart.getTime() + 20 * 60 * 60 * 1000);
      return { windowStart, windowEnd };
    }

    async function loadLeaderboard() {
      try {
        const now = getEffectiveDate();
        const { windowStart, windowEnd } = getGameDayWindow(now);

        const [
          { data: scores, error },
          { data: gdData },
          { data: furthestData },
          { data: teamsUsed },
          { data: rounds },
          { data: firstMatchData },
          { data: snapshots },
          { data: completedMatches },
          { data: todayMatchRows },
          { data: allPicks }
        ] = await Promise.all([
          db.from('player_scores').select('*'),
          db.from('player_gd').select('*'),
          db.from('player_furthest_round').select('*'),
          db.from('player_teams_used').select('player_id, match_result'),
          db.from('rounds').select('id, name, round_type, sort_order, is_complete').order('sort_order'),
          db.from('matches').select('round_id, kickoff').order('kickoff'),
          db.from('leaderboard_snapshots').select('player_id, position, round_id'),
          db.from('matches')
            .select('home_score, away_score')
            .eq('status', 'complete')
            .not('home_score', 'is', null),
          db.from('matches')
            .select('home_team_id, away_team_id, round_id')
            .gte('kickoff', windowStart.toISOString())
            .lte('kickoff', windowEnd.toISOString())
            .not('home_team_id', 'is', null),
          db.from('picks').select('player_id, team_id, multiplier, round_id, teams(flag_emoji, is_longshot), players(slug)')
        ]);

        if (error) throw error;

        // ── Projected goals ────────────────────────────────────
        let goalsScored = 0, matchesPlayed = 0;
        (completedMatches || []).forEach(m => {
          goalsScored  += (m.home_score || 0) + (m.away_score || 0);
          matchesPlayed++;
        });
        const projectedTotal = matchesPlayed > 0
          ? (goalsScored / matchesPlayed) * TOTAL_MATCHES
          : null;

        const projLabel = document.getElementById('proj-goals-label');
        if (projectedTotal !== null) {
          projLabel.textContent = `⚽ Projected tournament goals: ${Math.round(projectedTotal)} (${goalsScored} goals in ${matchesPlayed} matches)`;
        }

        // ── Round context ──────────────────────────────────────
        const currentRound       = (rounds || []).find(r => !r.is_complete);
        const isKnockout         = currentRound && currentRound.round_type === 'knockout';
        const completedRounds    = (rounds || []).filter(r => r.is_complete).sort((a,b) => b.sort_order - a.sort_order);
        const lastCompletedRound = completedRounds.length > 0 ? completedRounds[0] : null;

        // ── Day counter ────────────────────────────────────────
        let dayLabel = '';
        if (currentRound && firstMatchData) {
          const roundMatches = firstMatchData.filter(m => m.round_id === currentRound.id);
          if (roundMatches.length > 0) {
            const firstKickoff = new Date(roundMatches[0].kickoff);
            const dayNum = Math.floor((now - firstKickoff) / (24 * 60 * 60 * 1000)) + 1;
            if (dayNum >= 1) dayLabel = ' · Day ' + dayNum;
          }
        }

        if (currentRound) {
          let label = currentRound.name;
          if (currentRound.round_type === 'group') label = 'Group Stage · Round ' + currentRound.sort_order;
          document.getElementById('round-heading').textContent = label + dayLabel;
        }

        // ── Build lookup maps ──────────────────────────────────
        const gdMap = {};
        (gdData || []).forEach(r => { gdMap[r.player_id] = r.gd; });

        const furthestMap = {};
        (furthestData || []).forEach(r => { furthestMap[r.player_id] = r.furthest_round; });

        const priorPosMap = {};
        if (lastCompletedRound && snapshots) {
          snapshots
            .filter(s => s.round_id === lastCompletedRound.id)
            .forEach(s => { priorPosMap[s.player_id] = s.position; });
        }

        const formMap = {};
        (teamsUsed || []).forEach(r => {
          if (!formMap[r.player_id]) formMap[r.player_id] = [];
          if (r.match_result) formMap[r.player_id].push(r.match_result === 'win' ? 'W' : r.match_result === 'draw' ? 'D' : 'L');
        });

        // ── Today's picks ──────────────────────────────────────
        const todayTeamRoundPairs = new Set();
        (todayMatchRows || []).forEach(m => {
          todayTeamRoundPairs.add(m.home_team_id + '|' + m.round_id);
          todayTeamRoundPairs.add(m.away_team_id + '|' + m.round_id);
        });

        const playerTodayMap = {};
        (allPicks || []).forEach(pick => {
          const pairKey = pick.team_id + '|' + pick.round_id;
          if (todayTeamRoundPairs.has(pairKey) && pick.teams) {
            if (!playerTodayMap[pick.player_id]) {
              playerTodayMap[pick.player_id] = { picks: [], keys: new Set() };
            }
            const flag  = pick.teams.flag_emoji;
            const dedup = flag + '|' + pick.multiplier + '|' + pick.teams.is_longshot;
            if (!playerTodayMap[pick.player_id].keys.has(dedup)) {
              playerTodayMap[pick.player_id].keys.add(dedup);
              playerTodayMap[pick.player_id].picks.push({
                flag,
                isLongshot: pick.teams.is_longshot,
                multiplier: pick.multiplier
              });
            }
          }
        });

        const koDisplay = isKnockout ? '' : 'none';
        document.getElementById('left-col-header').style.display   = isKnockout ? '' : 'none';
        document.getElementById('status-col-header').style.display = isKnockout ? '' : 'none';
        document.querySelectorAll('.knockout-only').forEach(el => el.style.display = koDisplay);
        document.querySelectorAll('.group-only').forEach(el => el.style.display = isKnockout ? 'none' : '');

        // ── Sort ───────────────────────────────────────────────
        const sorted = (scores || []).sort((a, b) => {
          if (b.total_points !== a.total_points) return b.total_points - a.total_points;
          if (isKnockout) {
            const afr = furthestMap[a.player_id] || 0, bfr = furthestMap[b.player_id] || 0;
            if (bfr !== afr) return bfr - afr;
          }
          const agd = gdMap[a.player_id] || 0, bgd = gdMap[b.player_id] || 0;
          if (bgd !== agd) return bgd - agd;
          if (projectedTotal !== null) {
            const aDiff = Math.abs((a.total_goals_prediction || 0) - projectedTotal);
            const bDiff = Math.abs((b.total_goals_prediction || 0) - projectedTotal);
            if (aDiff !== bDiff) return aDiff - bDiff;
          }
          if (!isKnockout) return a.name.localeCompare(b.name);
          return 0;
        });

        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';

        sorted.forEach((p, i) => {
          const pos            = i + 1;
          const teamsLeft      = 48 - (p.teams_used || 0);
          const medal          = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : '';
          const gd             = gdMap[p.player_id] || 0;
          const form           = formMap[p.player_id] || [];
          const todayData      = playerTodayMap[p.player_id];
          const isPlayingToday = !!todayData;
          const todayPicks_p   = todayData ? todayData.picks : [];

          let arrowHtml = '<span class="arrow-eq">—</span>';
          if (priorPosMap[p.player_id]) {
            const prev = priorPosMap[p.player_id];
            if (pos < prev)      arrowHtml = '<span class="arrow-up">▲' + (prev - pos) + '</span>';
            else if (pos > prev) arrowHtml = '<span class="arrow-dn">▼' + (pos - prev) + '</span>';
          }

          const recentForm = form.slice(-5);
          const formHtml   = recentForm.map(f => '<span class="form-pip form-' + f + '" title="' + f + '"></span>').join('');
          const gdHtml     = gd > 0 ? '<span class="gd-pos">+' + gd + '</span>' : gd < 0 ? '<span class="gd-neg">' + gd + '</span>' : '<span class="gd-zero">0</span>';
          const flagHtml   = todayPicks_p.map(pick => {
            const cls = pick.multiplier === 3 ? (pick.isLongshot ? ' flag-3pt-longshot' : ' flag-3pt') : (pick.isLongshot ? ' flag-2pt-longshot' : ' flag-2pt');
            return '<span class="flag-inline' + cls + '">' + pick.flag + '</span>';
          }).join('');

          // ── Goals diff column ──────────────────────────────
          let goalsDiffHtml = '<span style="color:var(--text-muted)">—</span>';
          if (projectedTotal !== null && p.total_goals_prediction !== null && p.total_goals_prediction !== undefined) {
            const diff    = Math.round(p.total_goals_prediction - projectedTotal);
            const absDiff = Math.abs(diff);
            const sign    = diff >= 0 ? '+' : '-';
            const cls = diff >= 0 ? 'goals-diff-close' : 'goals-diff-far';

            goalsDiffHtml = `<span class="goals-diff ${cls}">${sign}${absDiff}</span>`;
          }

          const koStyle = isKnockout ? '' : 'display:none;';
          const row = document.createElement('tr');
          if (p.is_eliminated) row.classList.add('out-row');
          if (isPlayingToday && !p.is_eliminated) row.classList.add('playing-row');

          row.innerHTML =
            '<td class="pos">' + pos + '</td>' +
            '<td class="prior">' + arrowHtml + '</td>' +
            '<td class="medal">' + medal + '</td>' +
            '<td class="player-name"><a href="/' + p.slug + '">' + p.name + '</a>' + flagHtml + '</td>' +
            '<td style="color:var(--text-muted)">' + (p.rounds_played || 0) + '</td>' +
            '<td class="points">' + (p.total_points || 0) + '</td>' +
            '<td>' + gdHtml + '</td>' +
            '<td class="hide-mobile tiebreak-val">' + goalsDiffHtml + '</td>' +
            '<td class="hide-mobile">' + formHtml + '</td>' +
            '<td class="hide-mobile" style="' + koStyle + 'color:var(--text-muted)">' + teamsLeft + '</td>' +
            '<td class="hide-mobile" style="' + koStyle + '">' + (p.is_eliminated
              ? '<span class="badge badge-red">OUT</span>'
              : isPlayingToday ? '<span class="badge badge-blue">Playing</span>'
              : '<span class="badge badge-green">Alive</span>') + '</td>';

          tbody.appendChild(row);
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('leaderboard-wrap').style.display = 'block';
        document.getElementById('last-updated').textContent =
          'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});

      } catch(err) {
        console.error(err);
        document.getElementById('loading').innerHTML = '<p style="color:var(--red)">Failed to load. Check console.</p>';
      }
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 60000);
  </script>
</body>
</html>
