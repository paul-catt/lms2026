<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — LMS 2026</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .pos { font-weight:700; color:var(--text-muted); width:32px; }
    .prior { width:40px; text-align:center; font-size:11px; }
    .medal { width:24px; text-align:center; }
    .player-name { font-weight:600; }
    .player-name a { color:var(--text); text-decoration:none; }
    .player-name a:hover { color:var(--accent); }
    .points { font-size:16px; font-weight:700; }
    .out-row { opacity:0.45; }
    .playing-row { background:rgba(59,130,246,0.12) !important; }
    .playing-row:hover { background:rgba(59,130,246,0.18) !important; }
    .form-pip {
      display:inline-block; width:10px; height:10px;
      border-radius:50%; margin:0 1px;
    }
    .form-W { background:var(--green); }
    .form-D { background:var(--gold); }
    .form-L { background:var(--red); }
    .arrow-up { color:var(--green); font-size:11px; font-weight:700; }
    .arrow-dn { color:var(--red); font-size:11px; font-weight:700; }
    .arrow-eq { color:var(--text-muted); font-size:11px; }
    .flag-inline { font-size:15px; margin-left:5px; vertical-align:middle; }
    .gd-pos { color:var(--green); font-weight:600; }
    .gd-neg { color:var(--red); font-weight:600; }
    .gd-zero { color:var(--text-muted); }
    .tiebreak-val { color:var(--text-muted); font-size:12px; }
    .round-heading {
      font-size:12px; font-weight:600; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:0.05em;
      margin-bottom:12px;
    }
    thead th { white-space:nowrap; font-size:11px; color:var(--text-muted); }
    td { font-size:13px; }
    @media(max-width:600px) { .hide-mobile { display:none; } }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">⚽ LMS 2026</a>
    <div class="nav-links">
      <a href="/leaderboard" class="active">Leaderboard</a>
      <a href="/match-centre">Match Centre</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; flex-wrap:wrap; gap:8px">
        <div class="card-title" style="margin-bottom:0">📊 Leaderboard</div>
        <span id="last-updated" style="font-size:11px; color:var(--text-muted)"></span>
      </div>
      <div id="round-heading" class="round-heading"></div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        Loading standings...
      </div>

      <div id="leaderboard-wrap" class="table-wrap" style="display:none">
        <table>
          <thead>
            <tr>
              <th class="pos">#</th>
              <th class="prior hide-mobile">Prior</th>
              <th class="medal"></th>
              <th>Player</th>
              <th class="hide-mobile">Pld</th>
              <th>Pts</th>
              <th class="hide-mobile">GD</th>
              <th class="hide-mobile">Tie<br>break</th>
              <th class="hide-mobile">Form</th>
              <th class="hide-mobile">Left</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>

      <div style="margin-top:14px; font-size:11px; color:var(--text-muted); display:flex; gap:16px; flex-wrap:wrap">
        <span>🔵 Playing today</span>
        <span>🟢 Alive</span>
        <span>🔴 Eliminated</span>
        <span>⭐ Longshot pick</span>
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://jrdjdqjepffdcjdfuarc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyZGpkcWplcGZmZGNqZGZ1YXJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTczMTcsImV4cCI6MjA5MTAzMzMxN30.nzriEXXYSau-2wBElzgWw-Gwhf1crzVA2lcvPexjq0M';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getPrevPositions() {
      try { return JSON.parse(localStorage.getItem('lb_prev_pos') || '{}'); }
      catch { return {}; }
    }

    function saveCurrPositions(sorted) {
      try {
        const lastSaved = parseInt(localStorage.getItem('lb_pos_saved_at') || '0');
        if (Date.now() - lastSaved > 3600000) {
          const map = {};
          sorted.forEach((p, i) => { map[p.player_id] = i + 1; });
          localStorage.setItem('lb_prev_pos', JSON.stringify(map));
          localStorage.setItem('lb_pos_saved_at', Date.now().toString());
        }
      } catch {}
    }

    function ordinal(n) {
      const s = ['th','st','nd','rd'];
      const v = n % 100;
      return n + (s[(v-20)%10] || s[v] || s[0]);
    }

    async function loadLeaderboard() {
      try {
        const [
          { data: scores, error },
          { data: gdData },
          { data: furthestData },
          { data: teamsUsed },
          { data: todayPicks },
          { data: rounds }
        ] = await Promise.all([
          db.from('player_scores').select('*'),
          db.from('player_gd').select('*'),
          db.from('player_furthest_round').select('*'),
          db.from('player_teams_used').select('player_id, match_result'),
          db.from('todays_match_picks').select('player_slug, flag_emoji, pick_is_longshot').is('points_earned', null),
          db.from('rounds').select('name, round_type, sort_order, is_complete').order('sort_order')
        ]);

        if (error) throw error;

        // Work out current round label
        const currentRound = (rounds || []).find(r => !r.is_complete);
        if (currentRound) {
          // Count how many rounds of this type are complete
          const completedSameType = (rounds || []).filter(r => r.is_complete && r.round_type === currentRound.round_type).length;
          let label = currentRound.name;
          if (currentRound.round_type === 'group') {
            label = 'Group Stage · Round ' + currentRound.sort_order;
          }
          document.getElementById('round-heading').textContent = label;
        }

        // Lookup maps
        const gdMap = {};
        (gdData || []).forEach(r => { gdMap[r.player_id] = r.gd; });

        const furthestMap = {};
        (furthestData || []).forEach(r => { furthestMap[r.player_id] = r.furthest_round; });

        const todayMap = {};
        (todayPicks || []).forEach(r => {
          if (!todayMap[r.player_slug]) {
            todayMap[r.player_slug] = { flag: r.flag_emoji, isLongshot: r.pick_is_longshot };
          }
        });

        // Form — chronological order (oldest first = left, newest = right)
        const formMap = {};
        (teamsUsed || []).forEach(r => {
          if (!formMap[r.player_id]) formMap[r.player_id] = [];
          if (r.match_result) {
            formMap[r.player_id].push(
              r.match_result === 'win' ? 'W' :
              r.match_result === 'draw' ? 'D' : 'L'
            );
          }
        });

        // Sort — fixed tiebreaker order
        const sorted = (scores || []).sort((a, b) => {
          // 1. Total points
          if (b.total_points !== a.total_points) return b.total_points - a.total_points;
          // 2. Furthest round (longest in competition)
          const afr = furthestMap[a.player_id] || 0;
          const bfr = furthestMap[b.player_id] || 0;
          if (bfr !== afr) return bfr - afr;
          // 3. KO points
          if (b.knockout_points !== a.knockout_points) return b.knockout_points - a.knockout_points;
          // 4. GD — higher is better
          const agd = gdMap[a.player_id] || 0;
          const bgd = gdMap[b.player_id] || 0;
          if (bgd !== agd) return bgd - agd;
          // 5. Goals prediction — lower number wins (closest to actual)
          const ag = a.total_goals_prediction || 999;
          const bg = b.total_goals_prediction || 999;
          if (ag !== bg) return ag - bg;
          // 6. Alpha
          return a.name.localeCompare(b.name);
        });

        const prevPos = getPrevPositions();
        saveCurrPositions(sorted);

        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';

        sorted.forEach((p, i) => {
          const pos = i + 1;
          const teamsLeft = 48 - (p.teams_used || 0);
          const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : '';
          const gd = gdMap[p.player_id] || 0;
          const form = formMap[p.player_id] || [];
          const isPlayingToday = !!todayMap[p.slug];
          const todayInfo = todayMap[p.slug];

          // Movement arrow
          let arrowHtml = '<span class="arrow-eq">—</span>';
          if (prevPos[p.player_id]) {
            const prev = prevPos[p.player_id];
            if (pos < prev) arrowHtml = '<span class="arrow-up">▲' + (prev - pos) + '</span>';
            else if (pos > prev) arrowHtml = '<span class="arrow-dn">▼' + (pos - prev) + '</span>';
          }

          // Form pips — last 5, left to right, no grey placeholders
          const recentForm = form.slice(-5);
          const formHtml = recentForm.map(f =>
            '<span class="form-pip form-' + f + '" title="' + f + '"></span>'
          ).join('');

          // GD
          const gdHtml = gd > 0
            ? '<span class="gd-pos">+' + gd + '</span>'
            : gd < 0
              ? '<span class="gd-neg">' + gd + '</span>'
              : '<span class="gd-zero">0</span>';

          // Flag next to name if playing today
          const flagHtml = isPlayingToday
            ? '<span class="flag-inline">' + todayInfo.flag + (todayInfo.isLongshot ? '⭐' : '') + '</span>'
            : '';

          const row = document.createElement('tr');
          if (p.is_eliminated) row.classList.add('out-row');
          if (isPlayingToday && !p.is_eliminated) row.classList.add('playing-row');

          row.innerHTML =
            '<td class="pos">' + pos + '</td>' +
            '<td class="prior hide-mobile">' + arrowHtml + '</td>' +
            '<td class="medal">' + medal + '</td>' +
            '<td class="player-name"><a href="/' + p.slug + '">' + p.name + '</a>' + flagHtml + '</td>' +
            '<td class="hide-mobile" style="color:var(--text-muted)">' + (p.rounds_played || 0) + '</td>' +
            '<td class="points">' + (p.total_points || 0) + '</td>' +
            '<td class="hide-mobile">' + gdHtml + '</td>' +
            '<td class="hide-mobile tiebreak-val">' + ordinal(pos) + '</td>' +
            '<td class="hide-mobile">' + formHtml + '</td>' +
            '<td class="hide-mobile" style="color:var(--text-muted)">' + teamsLeft + '</td>' +
            '<td>' + (p.is_eliminated
              ? '<span class="badge badge-red">OUT</span>'
              : isPlayingToday
                ? '<span class="badge badge-blue">Playing</span>'
                : '<span class="badge badge-green">Alive</span>'
            ) + '</td>';

          tbody.appendChild(row);
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('leaderboard-wrap').style.display = 'block';
        document.getElementById('last-updated').textContent =
          'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});

      } catch(err) {
        console.error(err);
        document.getElementById('loading').innerHTML =
          '<p style="color:var(--red)">Failed to load. Check console.</p>';
      }
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 60000);
  </script>
</body>
</html>
