<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS 2026 — World Cup Last Man Standing</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons & PWA -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LMS 2026">

  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    nav, .nav-logo { font-family: 'Rajdhani', sans-serif; }

    .hero {
      text-align: center;
      padding: 52px 16px 36px;
    }
    .hero-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gold);
      margin-bottom: 4px;
      display: block;
      text-decoration: none;
      cursor: default;
    }
    .hero-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .hero-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 400px;
      margin: 0 auto 10px;
    }
    .hero-buttons-row2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 264px;
      margin: 0 auto;
    }
    .hero-buttons .btn,
    .hero-buttons-row2 .btn {
      font-size: 13px;
      padding: 10px 8px;
      text-align: center;
    }

    .status-strip {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin: 28px 0 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      font-size: 13px;
    }
    .status-row + .status-row {
      border-top: 1px solid var(--border);
    }
    .status-label {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-val {
      font-weight: 700;
      color: var(--text);
    }
    .status-val.gold  { color: var(--gold); }
    .status-val.accent { color: var(--accent); }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/"><img src="/logo.svg" alt="LMS 2026" height="34"></a>
    <div class="nav-links">
      <a href="/leaderboard">Leaderboard</a>
      <a href="/match-centre">Match Centre</a>
      <a href="/bracket">Bracket</a>
      <a href="/rules">Rules</a>
    </div>
  </nav>

  <main style="max-width:480px">
    <div class="hero">
      <a href="/admin" class="hero-title" tabindex="-1" aria-hidden="true">LMS 2026</a>
      <div class="hero-subtitle">World Cup Last Man Standing · June – July 2026</div>

      <div class="hero-buttons">
        <a href="/leaderboard" class="btn btn-secondary">📊 Leaderboard</a>
        <a href="/match-centre" class="btn btn-secondary">⚽ Match Centre</a>
        <a href="/player"      class="btn btn-secondary">👤 My Page</a>
      </div>
      <div style="height:10px"></div>
      <div class="hero-buttons-row2">
        <a href="/bracket" class="btn btn-secondary">🏆 Bracket</a>
        <a href="/rules"   class="btn btn-secondary">📋 Rules</a>
      </div>
    </div>

    <div class="status-strip">
      <div class="status-row">
        <span class="status-label">🏆 Top 3</span>
        <span class="status-val gold" id="status-leader">—</span>
      </div>
      <div class="status-row" id="status-p2-row" style="display:none">
        <span class="status-label">🥈</span>
        <span class="status-val" id="status-p2">—</span>
      </div>
      <div class="status-row" id="status-p3-row" style="display:none">
        <span class="status-label">🥉</span>
        <span class="status-val" id="status-p3">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">⏰ Next Deadline</span>
        <span class="status-val accent" id="status-deadline">—</span>
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL     = 'https://jrdjdqjepffdcjdfuarc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyZGpkcWplcGZmZGNqZGZ1YXJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTczMTcsImV4cCI6MjA5MTAzMzMxN30.nzriEXXYSau-2wBElzgWw-Gwhf1crzVA2lcvPexjq0M';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const WINDOW_START_HOUR = 11; // UTC (noon BST)

    async function loadStatus() {
      // ── Top 3 ────────────────────────────────────────────────
      const { data: scores } = await db
        .from('player_scores')
        .select('total_points, players(name)')
        .order('total_points', { ascending: false })
        .limit(3);

      const leaderEl = document.getElementById('status-leader');
      if (scores && scores.length > 0 && scores[0].players) {
        leaderEl.textContent = scores[0].players.name + ' · ' + scores[0].total_points + 'pts';
        if (scores[1]) {
          document.getElementById('status-p2-row').style.display = '';
          document.getElementById('status-p2').textContent = scores[1].players.name + ' · ' + scores[1].total_points + 'pts';
        }
        if (scores[2]) {
          document.getElementById('status-p3-row').style.display = '';
          document.getElementById('status-p3').textContent = scores[2].players.name + ' · ' + scores[2].total_points + 'pts';
        }
      } else {
        leaderEl.textContent = 'Not started yet';
      }

      // ── Next deadline ────────────────────────────────────────
      const now = new Date();
      const { data: nextMatches } = await db
        .from('matches')
        .select('kickoff')
        .eq('status', 'scheduled')
        .not('home_team_id', 'is', null)
        .order('kickoff', { ascending: true })
        .limit(1);

      const deadlineEl = document.getElementById('status-deadline');
      if (nextMatches && nextMatches.length > 0) {
        const kickoff = new Date(nextMatches[0].kickoff);
        // Deadline = 11:00 UTC of the day window containing this kickoff
        let deadlineUtc = new Date(Date.UTC(
          kickoff.getUTCFullYear(), kickoff.getUTCMonth(), kickoff.getUTCDate(),
          WINDOW_START_HOUR, 0, 0
        ));
        if (kickoff.getUTCHours() < WINDOW_START_HOUR) {
          deadlineUtc = new Date(deadlineUtc.getTime() - 86400000);
        }
        // If that deadline has already passed, advance one window
        if (deadlineUtc <= now) {
          deadlineUtc = new Date(deadlineUtc.getTime() + 86400000);
        }
        const label = deadlineUtc.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
        const time  = deadlineUtc.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/London' });
        deadlineEl.textContent = label + ' · ' + time + ' BST';
      } else {
        deadlineEl.textContent = 'No upcoming matches';
      }
    }

    loadStatus();
  </script>
</body>
</html>
