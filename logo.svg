<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cup-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#92650a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Trophy body -->
  <path d="M10 8 L32 8 L29 26 L13 26 Z" fill="url(#cup-grad)"/>

  <!-- Handles -->
  <path d="M10 10 Q4 10 4 16 Q4 22 10 22" stroke="url(#cup-grad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M32 10 Q38 10 38 16 Q38 22 32 22" stroke="url(#cup-grad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Stem + base -->
  <rect x="18" y="26" width="6" height="5" rx="1" fill="#b45309"/>
  <rect x="13" y="31" width="16" height="3" rx="1.5" fill="url(#cup-grad)"/>
  <rect x="11" y="34" width="20" height="2.5" rx="1.25" fill="#92650a"/>

  <!-- Cup shine -->
  <path d="M14 10 L16 24" stroke="rgba(255,255,255,0.18)" stroke-width="2" stroke-linecap="round"/>

  <!-- Crosshair: outer ring -->
  <circle cx="21" cy="17" r="6" stroke="white" stroke-width="1.5" fill="rgba(255,255,255,0.08)" filter="url(#glow)"/>
  <!-- Crosshair: tick marks -->
  <line x1="21" y1="10.5" x2="21" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="21"   x2="21" y2="23.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14.5" y1="17" x2="17" y2="17"   stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25"   y1="17" x2="27.5" y2="17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="21" cy="17" r="2" fill="white" filter="url(#glow)"/>

  <!-- Divider -->
  <line x1="48" y1="9" x2="48" y2="45" stroke="#1e2d48" stroke-width="1.5"/>

  <!-- LMS wordmark -->
  <text
    x="57" y="35"
    font-family="'Rajdhani', 'Arial Black', Impact, sans-serif"
    font-weight="700"
    font-size="29"
    letter-spacing="4"
    fill="url(#gold-grad)">LMS</text>

  <!-- 2026 -->
  <text
    x="59" y="47"
    font-family="'Rajdhani', Arial, sans-serif"
    font-weight="600"
    font-size="11"
    letter-spacing="7"
    fill="#3d5270">2026</text>

  <!-- Tagline -->
  <text
    x="128" y="47"
    font-family="'Rajdhani', Arial, sans-serif"
    font-weight="500"
    font-size="8.5"
    letter-spacing="1.8"
    fill="#263654">LAST MAN STANDING</text>

</svg>
